<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0c0b; color: #e8efea; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  button:hover { filter: brightness(1.08); }
  button:active { transform: translateY(1px); }
  input:focus, textarea:focus { border-color: #00b87a !important; }

  @keyframes aurasBlink {
    0%, 100% { opacity: 0.25; transform: translateY(0); }
    50%      { opacity: 1;    transform: translateY(-2px); }
  }
  @keyframes aurasPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,184,122,0.55); }
    50%      { box-shadow: 0 0 0 8px rgba(0,184,122,0.0); }
  }
  @keyframes aurasChipPop {
    from { transform: translateY(6px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0)    scale(1);    opacity: 1; }
  }
  @keyframes aurasTick {
    0%   { opacity: 0.3; }
    50%  { opacity: 1; }
    100% { opacity: 0.3; }
  }
  @keyframes aurasFadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: rgba(120,120,120,0.25); border-radius: 4px; }
  *::-webkit-scrollbar-track { background: transparent; }

  ::selection { background: #00b87a; color: #041008; }

  /* Responsive hardening for narrower viewports */
  @media (max-width: 1100px) {
    .auras-hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
    .auras-hero-chat-wrap { max-width: 100% !important; }
    .auras-playground-grid { grid-template-columns: 1fr !important; gap: 28px !important; }
    .auras-playground-sidebar { position: static !important; flex-direction: row !important; flex-wrap: wrap !important; }
    .auras-playground-sidebar > button { flex: 1 1 auto; min-width: 180px; }
    .auras-playground-inner { grid-template-columns: 1fr !important; }
    .auras-how-grid { grid-template-columns: 1fr !important; }
    .auras-how-grid > div + div { margin-top: 0; }
    .auras-how-line { display: none !important; }
    .auras-features-grid { grid-template-columns: 1fr 1fr !important; }
    .auras-features-grid > div { grid-column: auto !important; }
    .auras-usecases-grid { grid-template-columns: 1fr 1fr !important; }
    .auras-integrations-grid { grid-template-columns: 1fr 1fr !important; }
    .auras-nav-links { display: none !important; }
    .auras-compare-grid { font-size: 12px; }
    .auras-hero-outer { padding: 48px 32px 64px !important; }

// ═══════════════════════════════════════════════════════════════════
// LAYOUT HELPERS
// ═══════════════════════════════════════════════════════════════════
function Section({ children, id, style = {}, eyebrow, title, blurb, align = "left", pad = "120px 64px" }) {
  return (
    <section id={id} className="auras-section" style={{ position: "relative", padding: pad, borderTop: `1px solid ${T.border}`, ...style }} data-screen-label={id}>
      <div style={{ maxWidth: T.maxW, margin: "0 auto", position: "relative" }}>
        {(eyebrow || title || blurb) && (
          <SectionHeader eyebrow={eyebrow} title={title} blurb={blurb} align={align} />
        )}
        {children}
      </div>
    </section>
  );
}

function SectionHeader({ eyebrow, title, blurb, align = "left" }) {
  const center = align === "center";
  return (
    <div style={{ marginBottom: 56, textAlign: center ? "center" : "left", maxWidth: center ? 720 : 760, marginLeft: center ? "auto" : 0, marginRight: center ? "auto" : 0 }}>
      {eyebrow && (
        <div style={{ display: "inline-flex", alignItems: "center", gap: 8, fontFamily: T.mono, fontSize: 11, color: T.accent, textTransform: "uppercase", letterSpacing: "0.16em", fontWeight: 600, marginBottom: 20 }}>
          <span style={{ width: 18, height: 1, background: T.accent }}/>
          {eyebrow}
        </div>
      )}
      {title && (
        <h2 className="auras-section-title" style={{ fontSize: 52, fontWeight: 600, letterSpacing: "-0.032em", lineHeight: 1.05, margin: 0, color: T.textHi }}>
          {title}
        </h2>
      )}
      {blurb && (
        <p style={{ fontSize: 18, color: T.textMid, lineHeight: 1.55, marginTop: 20, marginBottom: 0, maxWidth: 640, marginLeft: center ? "auto" : 0, marginRight: center ? "auto" : 0 }}>
          {blurb}
        </p>
      )}
    </div>
  );
}

function BgGrid({ opacity = 0.03, size = 80 }) {

    <div style={{
      position: "absolute", inset: 0, pointerEvents: "none",
      backgroundImage: `linear-gradient(to right, rgba(255,255,255,${opacity}) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,${opacity}) 1px, transparent 1px)`,
      backgroundSize: `${size}px ${size}px`,

}

function GlowBlob({ color = T.accent, x = -200, y = -200, size = 600, opacity = 0.18 }) {
  return (
    <div style={{
      position: "absolute", left: x, top: y, width: size, height: size,
      background: `radial-gradient(circle, ${color}, transparent 65%)`,
      opacity, pointerEvents: "none", filter: "blur(2px)",

  );
}

// ═══════════════════════════════════════════════════════════════════
// LIVE CHAT  (industry-aware)
// ═══════════════════════════════════════════════════════════════════
function TypingDots() {
  const dot = (d) => ({ width: 6, height: 6, borderRadius: 999, background: "currentColor", opacity: 0.5, animation: `aurasBlink 1s ${d}s infinite ease-in-out` });
  return (
    <span style={{ display: "inline-flex", gap: 4, alignItems: "center", height: 16 }}>
      <span style={dot(0)} /><span style={dot(0.15)} /><span style={dot(0.3)} />
    </span>
  );
}

function LiveChat({ persona = PERSONAS.salon, style = {}, showChips = true, compact = false }) {
  const [messages, setMessages] = React.useState(persona.seed);
  const [input, setInput]       = React.useState("");
  const [busy, setBusy]         = React.useState(false);
  const [typing, setTyping]     = React.useState(false);
  const [userHasSent, setUserHasSent] = React.useState(false);
  const [placeholderIdx, setPlaceholderIdx] = React.useState(0);
  const [typedPH, setTypedPH]   = React.useState("");
  const scrollRef = React.useRef(null);
  const inputRef  = React.useRef(null);

  // Reset when persona swaps
  React.useEffect(() => {
    setMessages(persona.seed);
    setUserHasSent(false);
    setInput("");
    setPlaceholderIdx(0);
  }, [persona.id]);

  React.useEffect(() => {
    const el = scrollRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [messages, typing]);

  const placeholderRotation = [
    `Ask ${persona.name}…`,
    `Try: ${persona.suggestions[0]}`,
    `Try: ${persona.suggestions[1]}`,
    `Type anything — it's live`,
  ];

  React.useEffect(() => {
    if (input.length > 0 || userHasSent) return;
    const full = placeholderRotation[placeholderIdx];
    let i = 0;
    setTypedPH("");
    const typer = setInterval(() => {
      i++;
      setTypedPH(full.slice(0, i));
      if (i >= full.length) clearInterval(typer);
    }, 55);
    const next = setTimeout(() => {
      setPlaceholderIdx((p) => (p + 1) % placeholderRotation.length);
    }, full.length * 55 + 2200);
    return () => { clearInterval(typer); clearTimeout(next); };
  }, [placeholderIdx, input, userHasSent, persona.id]);

  const nowTime = () => {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };

  // Per-visitor daily cap (localStorage)
  const PER_VISITOR_CAP = 10;
  const LIMIT_KEY = "auras_msg_count_v1";
  const getUsage = () => {
    try {
      const raw = localStorage.getItem(LIMIT_KEY);
      const today = new Date().toDateString();
      if (!raw) return { count: 0, day: today };
      const p = JSON.parse(raw);
      if (p.day !== today) return { count: 0, day: today };
      return p;
    } catch { return { count: 0, day: new Date().toDateString() }; }
  };
  const setUsage = (u) => { try { localStorage.setItem(LIMIT_KEY, JSON.stringify(u)); } catch {} };

  const sendText = async (raw) => {
    const text = (raw ?? input).trim();
    if (!text || busy) return;

    // Client-side cap
    const usage = getUsage();
    if (usage.count >= PER_VISITOR_CAP) {
      setInput(""); setUserHasSent(true);
      setMessages(m => [...m,
        { from: "customer", text, time: nowTime() },
        { from: "ai", text: "You've hit the demo limit for today 🙏 Get your own Auras for R299/mo — live in 24h. Tap Get Started above ⚡", time: nowTime(), isLimit: true },
      ]);
      return;
    }

    setInput(""); setBusy(true); setUserHasSent(true);
    const newMsgs = [...messages, { from: "customer", text, time: nowTime() }];
    setMessages(newMsgs);
    setTyping(true);
    setUsage({ count: usage.count + 1, day: usage.day });

    try {
      let clean = "";
      const canCallApi = typeof window !== "undefined" && window.location && !window.location.protocol.startsWith("file");

      if (canCallApi) {
        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              persona: persona.id,
              system: persona.system,
              messages: newMsgs.map(m => ({ role: m.from === "customer" ? "user" : "assistant", content: m.text })),
            }),
          });
          if (res.status === 429) {
            const data = await res.json().catch(() => ({}));
            clean = data.message || "Lots of traffic right now — try again in a bit, or grab your own Auras for R299/mo ⚡";
          } else if (!res.ok) {
            throw new Error("api " + res.status);
          } else {
            const data = await res.json();
            clean = (data.reply || "").trim().replace(/^Auras:\s*/i, "").slice(0, 400);
          }
        } catch (apiErr) {
          // Fall back to preview helper if /api/chat isn't deployed yet
          if (window.claude && window.claude.complete) {
            const history = newMsgs.map(m => `${m.from === "customer" ? "Customer" : "Auras"}: ${m.text}`).join("\n");
            const prompt = `${persona.system}\n\nConversation so far:\n${history}\n\nReply as Auras. One to two short sentences only.`;
            const reply = await window.claude.complete(prompt);
            clean = (reply || "").trim().replace(/^Auras:\s*/i, "").slice(0, 400);
          } else {
            throw apiErr;
          }
        }
      } else if (window.claude && window.claude.complete) {
        const history = newMsgs.map(m => `${m.from === "customer" ? "Customer" : "Auras"}: ${m.text}`).join("\n");
        const prompt = `${persona.system}\n\nConversation so far:\n${history}\n\nReply as Auras. One to two short sentences only.`;
        const reply = await window.claude.complete(prompt);
        clean = (reply || "").trim().replace(/^Auras:\s*/i, "").slice(0, 400);
      }

      await new Promise(r => setTimeout(r, 400));
      setMessages(m => [...m, { from: "ai", text: clean || "One sec, let me check and come back to you.", time: nowTime() }]);
    } catch (e) {
      setMessages(m => [...m, { from: "ai", text: "Connection wobble — try again in a sec.", time: nowTime() }]);
    } finally {
      setTyping(false); setBusy(false);
    }
  };

  const send = () => sendText();
  const onKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

  const s = {
    wrap:      { background: T.bg, border: `1px solid ${T.border}`, borderRadius: 14, overflow: "hidden", display: "flex", flexDirection: "column", fontFamily: T.sans, color: T.text, ...style },
    header:    { padding: "14px 16px", borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", gap: 10, fontSize: 12, flexShrink: 0, flexWrap: "wrap" },
    dot:       { width: 7, height: 7, borderRadius: 999, background: T.accent, boxShadow: `0 0 8px ${T.accent}` },

// BUTTONS

function PrimaryBtn({ children, accent = T.accent, size = "md", href, onClick, style = {} }) {
  const sizes = { sm: "10px 16px", md: "14px 22px", lg: "16px 28px" };
  const fontSize = size === "sm" ? 13 : size === "lg" ? 16 : 15;
  const base = { background: accent, color: T.accentInk, border: "none", borderRadius: 6, padding: sizes[size], fontSize, fontWeight: 600, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 10, fontFamily: T.sans, ...style };
  if (href) return <a href={href} style={base}>{children}</a>;
  return <button onClick={onClick} style={base}>{children}</button>;
}
function GhostBtn({ children, href, onClick, style = {}, size = "md" }) {
  const sizes = { sm: "10px 16px", md: "14px 22px", lg: "16px 28px" };
  const fontSize = size === "sm" ? 13 : size === "lg" ? 16 : 15;
  const base = { background: "transparent", color: T.text, border: `1px solid ${T.borderHi}`, borderRadius: 6, padding: sizes[size], fontSize, fontWeight: 500, cursor: "pointer", fontFamily: T.sans, display: "inline-flex", alignItems: "center", gap: 10, ...style };
  if (href) return <a href={href} style={base}>{children}</a>;
  return <button onClick={onClick} style={base}>{children}</button>;
}
function ArrowIcon({ size = 14 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{children}</div>
    </div>
  );
}
function TColor({ label, value, onChange, presets = [] }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: "#9ba8a2", marginBottom: 6 }}>{label}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <input type="color" value={value} onChange={(e) => onChange(e.target.value)} style={{ width: 32, height: 28, border: "1px solid #1f2722", borderRadius: 6, background: "transparent", cursor: "pointer" }}/>
        <input type="text" value={value} onChange={(e) => onChange(e.target.value)} style={tInputStyle}/>
      </div>
      {presets.length > 0 && (
        <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
          {presets.map(p => (
            <button key={p} onClick={() => onChange(p)} style={{ width: 22, height: 22, borderRadius: 6, background: p, border: value.toLowerCase() === p.toLowerCase() ? "2px solid #fff" : "1px solid #1f2722", cursor: "pointer" }}/>
          ))}
        </div>
      )}
    </div>
  );
}
function TText({ label, value, onChange, multiline }) {
  return (
    <div>
      <div style={{ fontSize: 11, color: "#9ba8a2", marginBottom: 6 }}>{label}</div>
      {multiline ? (
        <textarea value={value} onChange={(e) => onChange(e.target.value)} rows={3} style={{ ...tInputStyle, resize: "vertical", fontFamily: "inherit" }}/>
      ) : (
        <input type="text" value={value} onChange={(e) => onChange(e.target.value)} style={tInputStyle}/>
      )}
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setEditMode(true);
      if (e.data?.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  return (
    <div style={{ background: T.bg, minHeight: "100vh" }}>
      <Nav accent={tweaks.accent} />
      <Hero tweaks={tweaks} />
      {tweaks.showLogos       && <LogoBar />}
      {tweaks.showHow         && <HowItWorks />}
      {tweaks.showFeatures    && <Features />}
      {tweaks.showPlayground  && <Playground />}
      {tweaks.showUseCases    && <UseCases />}
      {tweaks.showIntegrations&& <Integrations />}
      {tweaks.showCompare     && <Comparison />}
      {tweaks.showPricing     && <Pricing tweaks={tweaks} />}
      {tweaks.showFAQ         && <FAQ />}
      <FooterCTA tweaks={tweaks} />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} active={editMode} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);


</script>
</body>
</html>
