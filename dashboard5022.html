<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auras Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
  input, select, button { font-family: inherit; }
  input { width: 100%; padding: 8px 12px; font-size: 13px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; }
  input:focus { box-shadow: 0 0 0 2px #378ADD44; border-color: #378ADD; }
  button { cursor: pointer; background: transparent; border: 0.5px solid #ccc; border-radius: 8px; padding: 6px 14px; font-size: 12px; color: #1a1a1a; }
  button:hover { background: #f0f0ee; }
  select { padding: 6px 10px; font-size: 12px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef } = React;
const SUPABASE_URL = "https://xyxyqtomvsqqfdembomk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5eHlxdG9tdnNxcWZkZW1ib21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTE0NjgsImV4cCI6MjA5MjE4NzQ2OH0.fJWu9xweGvYn9cEGlHa3jcZXQvDzlKWS6ATxlEZ0DnQ";
const hdrs = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

async function apiFetch(path) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: hdrs });
  return r.json();
}

function pill(text, bg, col) {
  return React.createElement("span", { style: { background: bg, color: col, fontSize: 10, fontWeight: 500, padding: "2px 7px", borderRadius: 20, whiteSpace: "nowrap" } }, text);
}

function StatCard({ label, value, color }) {
  return React.createElement("div", { style: { background: "#f0f0ee", borderRadius: 8, padding: "12px 14px", flex: 1, minWidth: 0 } },
    React.createElement("div", { style: { fontSize: 11, color: "#888", marginBottom: 4 } }, label),
    React.createElement("div", { style: { fontSize: 24, fontWeight: 500, color } }, value)
  );
}

function ActivityChart({ bots, convs }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !bots.length) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const botIds = new Set(convs.map(c => c.bot_id));
    const activeBots = bots.filter(b => botIds.has(b.id));
    const sorted = [...activeBots].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    if (!sorted.length) return;

    const start = new Date(sorted[0].created_at);
    const end = new Date();
    const days = [];
    const d = new Date(start);
    d.setHours(0,0,0,0);
    while (d <= end) { days.push(d.toISOString().split("T")[0]); d.setDate(d.getDate() + 1); }

    const counts = {};
    days.forEach(day => { counts[day] = 0; });
    activeBots.forEach(bot => {
      const day = bot.created_at.split("T")[0];
      if (counts[day] !== undefined) counts[day]++;
    });

    let cum = 0;
    const cumData = days.map(day => { cum += counts[day]; return cum; });

    chartRef.current = new Chart(canvasRef.current, {
      type: "line",
      data: {
        labels: days.map(d => { const dt = new Date(d); return dt.toLocaleDateString([], { month: "short", day: "numeric" }); }),
        datasets: [{ label: "Bots with interactions", data: cumData, borderColor: "#7F77DD", backgroundColor: "rgba(127,119,221,0.08)", borderWidth: 2, pointRadius: cumData.length > 14 ? 0 : 3, pointBackgroundColor: "#7F77DD", fill: true, tension: 0.3 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} bots` } } },
        scales: {
          x: { grid: { color: "rgba(128,128,128,0.1)" }, ticks: { color: "#888", font: { size: 11 }, maxTicksLimit: 8, maxRotation: 0 } },
          y: { grid: { color: "rgba(128,128,128,0.1)" }, ticks: { color: "#888", font: { size: 11 }, stepSize: 1 }, beginAtZero: true }
        }
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [bots, convs]);

  return React.createElement("div", { style: { border: "0.5px solid #ddd", borderRadius: 12, padding: "14px 16px", marginBottom: 16, background: "#fff" } },
    React.createElement("div", { style: { fontSize: 12, fontWeight: 500, color: "#888", marginBottom: 10 } }, "Bots with interactions over time"),
    React.createElement("div", { style: { position: "relative", height: 180 } },
      React.createElement("canvas", { ref: canvasRef, role: "img", "aria-label": "Cumulative bots with interactions over time" }, "Cumulative bots with interactions over time.")
    )
  );
}

function BotRow({ bot, msgCount, lastActivity, selected, onClick }) {
  const initials = (bot.company_name || "??").substring(0, 2).toUpperCase();
  const hasPhone = bot.contact_phone && bot.contact_phone !== "NULL";
  const hasEmail = bot.contact_email && bot.contact_email !== "NULL";
  const isWaitlist = bot.waitlist === true;
  const isActive = msgCount > 0;

  const timeAgo = lastActivity ? (() => {
    const diff = Date.now() - new Date(lastActivity);
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  })() : null;

  return React.createElement("div", {
    onClick,
    style: { display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", cursor: "pointer", borderBottom: "0.5px solid #eee", background: selected ? "#f5f5f3" : "transparent" }
  },
    React.createElement("div", { style: { width: 34, height: 34, borderRadius: "50%", flexShrink: 0, background: isActive ? "#E1F5EE" : "#F1EFE8", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 500, color: isActive ? "#0F6E56" : "#5F5E5A" } }, initials),
    React.createElement("div", { style: { flex: 1, minWidth: 0 } },
      React.createElement("div", { style: { fontSize: 13, fontWeight: 500, color: "#1a1a1a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, bot.company_name || "Unknown"),
      React.createElement("div", { style: { fontSize: 10, color: "#888", marginTop: 1, display: "flex", gap: 6 } },
        React.createElement("span", null, bot.trigger_keyword),
        timeAgo && React.createElement("span", null, `· ${timeAgo}`)
      )
    ),
    React.createElement("div", { style: { display: "flex", gap: 3, alignItems: "center", flexShrink: 0 } },
      msgCount > 0 && React.createElement("span", { style: { background: "#E1F5EE", color: "#0F6E56", fontSize: 10, fontWeight: 500, padding: "2px 7px", borderRadius: 20 } }, `${msgCount} msg${msgCount !== 1 ? "s" : ""}`),
      isWaitlist && pill("waitlist", "#E6F1FB", "#185FA5"),
      hasPhone && pill("ph", "#EAF3DE", "#3B6D11"),
      hasEmail && pill("em", "#FAEEDA", "#854F0B")
    )
  );
}

function ConversationPane({ bot, conversations }) {
  if (!bot) return React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#888", fontSize: 13 } }, "Select a bot to view conversation");
  const msgs = conversations.filter(c => c.bot_id === bot.id);
  return React.createElement("div", { style: { display: "flex", flexDirection: "column", height: "100%" } },
    React.createElement("div", { style: { padding: "10px 14px", borderBottom: "0.5px solid #eee", flexShrink: 0 } },
      React.createElement("div", { style: { fontSize: 13, fontWeight: 500, color: "#1a1a1a" } }, bot.company_name),
      React.createElement("div", { style: { fontSize: 10, color: "#888", marginTop: 2 } }, `${bot.trigger_keyword} · ${(bot.contact_phone || "").replace("whatsapp:", "") || "no phone"}`)
    ),
    React.createElement("div", { style: { flex: 1, overflowY: "auto", padding: "10px 14px", display: "flex", flexDirection: "column", gap: 7 } },
      msgs.length === 0
        ? React.createElement("div", { style: { color: "#888", fontSize: 12, textAlign: "center", marginTop: 20 } }, "No messages yet")
        : msgs.map(msg => React.createElement("div", { key: msg.id, style: { alignSelf: msg.role === "user" ? "flex-start" : "flex-end", maxWidth: "85%" } },
            React.createElement("div", { style: { background: msg.role === "user" ? "#f0f0ee" : "#EEEDFE", color: msg.role === "user" ? "#1a1a1a" : "#3C3489", borderRadius: msg.role === "user" ? "10px 10px 10px 2px" : "10px 10px 2px 10px", padding: "7px 11px", fontSize: 12, lineHeight: 1.5 } }, msg.message_text),
            React.createElement("div", { style: { fontSize: 9, color: "#888", marginTop: 2, textAlign: msg.role === "user" ? "left" : "right" } }, new Date(msg.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }))
          ))
    )
  );
}

function App() {
  const [bots, setBots] = useState([]);
  const [convs, setConvs] = useState([]);
  const [selected, setSelected] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("bots");
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");

  async function load() {
    setLoading(true);
    try {
      const [b, c] = await Promise.all([
        apiFetch("bots?select=*&order=created_at.desc"),
        apiFetch("conversations?select=*&order=created_at.asc&limit=500")
      ]);
      setBots(Array.isArray(b) ? b : []);
      setConvs(Array.isArray(c) ? c : []);
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  useEffect(() => { load(); }, []);

  const msgCountMap = {};
  const lastActivityMap = {};
  convs.forEach(c => {
    msgCountMap[c.bot_id] = (msgCountMap[c.bot_id] || 0) + 1;
    if (!lastActivityMap[c.bot_id] || c.created_at > lastActivityMap[c.bot_id]) lastActivityMap[c.bot_id] = c.created_at;
  });

  const activeBotIds = new Set(convs.map(c => c.bot_id));
  const totalActive = bots.filter(b => activeBotIds.has(b.id)).length;
  const waitlistCount = bots.filter(b => b.waitlist === true || b.waitlist === "true" || b.waitlist === "TRUE").length;

  let filtered = bots.filter(b => {
    if (search && !(b.company_name || "").toLowerCase().includes(search.toLowerCase()) && !(b.trigger_keyword || "").toLowerCase().includes(search.toLowerCase())) return false;
    if (filter === "active" && !activeBotIds.has(b.id)) return false;
    if (filter === "waitlist" && !b.waitlist) return false;
    if (filter === "inactive" && activeBotIds.has(b.id)) return false;
    return true;
  }).sort((a, b) => new Date(lastActivityMap[b.id] || b.created_at) - new Date(lastActivityMap[a.id] || a.created_at));

  const tabBtn = (t, label) => React.createElement("button", {
    onClick: () => setTab(t),
    style: { fontSize: 12, fontWeight: 500, padding: "5px 12px", borderRadius: 20, border: "none", background: tab === t ? "#e8e8e6" : "transparent", color: tab === t ? "#1a1a1a" : "#888" }
  }, label);

  return React.createElement("div", { style: { maxWidth: 960, margin: "0 auto" } },
    React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 } },
      React.createElement("div", null,
        React.createElement("div", { style: { fontSize: 20, fontWeight: 500, color: "#1a1a1a" } }, "Auras"),
        React.createElement("div", { style: { fontSize: 11, color: "#888", marginTop: 1 } }, "Bot monitoring dashboard")
      ),
      React.createElement("button", { onClick: load }, loading ? "Loading..." : "Refresh")
    ),

    React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 16 } },
      React.createElement(StatCard, { label: "Total bots", value: bots.length, color: "#7F77DD" }),
      React.createElement(StatCard, { label: "Active (interacted)", value: totalActive, color: "#1D9E75" }),
      React.createElement(StatCard, { label: "Waitlist", value: waitlistCount, color: "#185FA5" }),
      React.createElement(StatCard, { label: "Messages", value: convs.length, color: "#BA7517" })
    ),

    React.createElement(ActivityChart, { bots, convs }),

    React.createElement("div", { style: { display: "flex", gap: 2, marginBottom: 12 } },
      tabBtn("bots", "Bots"),
      tabBtn("waitlist", `Waitlist (${waitlistCount})`),
      tabBtn("conversations", "All messages")
    ),

    tab === "bots" && React.createElement("div", null,
      React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 10 } },
        React.createElement("input", { placeholder: "Search...", value: search, onChange: e => setSearch(e.target.value) }),
        React.createElement("select", { value: filter, onChange: e => setFilter(e.target.value) },
          React.createElement("option", { value: "all" }, "All bots"),
          React.createElement("option", { value: "active" }, "Interacted"),
          React.createElement("option", { value: "inactive" }, "No interaction"),
          React.createElement("option", { value: "waitlist" }, "Waitlist only")
        )
      ),
      React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, height: 400 } },
        React.createElement("div", { style: { border: "0.5px solid #ddd", borderRadius: 12, overflowY: "auto", background: "#fff" } },
          loading
            ? React.createElement("div", { style: { padding: 20, color: "#888", fontSize: 13 } }, "Loading...")
            : filtered.length === 0
              ? React.createElement("div", { style: { padding: 20, color: "#888", fontSize: 13 } }, "No bots match filter")
              : filtered.map(bot => React.createElement(BotRow, { key: bot.id, bot, msgCount: msgCountMap[bot.id] || 0, lastActivity: lastActivityMap[bot.id], selected: selected?.id === bot.id, onClick: () => setSelected(bot) }))
        ),
        React.createElement("div", { style: { border: "0.5px solid #ddd", borderRadius: 12, overflow: "hidden", background: "#fff" } },
          React.createElement(ConversationPane, { bot: selected, conversations: convs })
        )
      )
    ),

    tab === "waitlist" && React.createElement("div", { style: { border: "0.5px solid #ddd", borderRadius: 12, overflow: "hidden", background: "#fff" } },
      bots.filter(b => b.waitlist).length === 0
        ? React.createElement("div", { style: { padding: 20, color: "#888", fontSize: 13 } }, "No waitlist signups yet")
        : bots.filter(b => b.waitlist).map(bot => React.createElement("div", { key: bot.id, style: { display: "flex", alignItems: "center", gap: 12, padding: "11px 16px", borderBottom: "0.5px solid #eee" } },
            React.createElement("div", { style: { width: 34, height: 34, borderRadius: "50%", background: "#E6F1FB", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 500, color: "#185FA5" } }, (bot.company_name || "??").substring(0, 2).toUpperCase()),
            React.createElement("div", { style: { flex: 1 } },
              React.createElement("div", { style: { fontSize: 13, fontWeight: 500 } }, bot.company_name),
              React.createElement("div", { style: { fontSize: 11, color: "#888", marginTop: 1 } }, `${(bot.contact_phone || "").replace("whatsapp:", "") || "no phone"} · ${bot.contact_email || "no email"}`)
            ),
            React.createElement("div", { style: { fontSize: 11, color: "#888" } }, new Date(bot.created_at).toLocaleDateString()),
            React.createElement("div", { style: { fontSize: 11, color: "#1D9E75", fontWeight: 500 } }, `${msgCountMap[bot.id] || 0} msgs`)
          ))
    ),

    tab === "conversations" && React.createElement("div", { style: { border: "0.5px solid #ddd", borderRadius: 12, overflow: "hidden", background: "#fff", maxHeight: 500, overflowY: "auto" } },
      convs.length === 0
        ? React.createElement("div", { style: { padding: 20, color: "#888", fontSize: 13 } }, "No conversations yet")
        : [...convs].reverse().slice(0, 150).map(msg => {
            const bot = bots.find(b => b.id === msg.bot_id);
            return React.createElement("div", { key: msg.id, style: { display: "flex", alignItems: "flex-start", gap: 10, padding: "9px 14px", borderBottom: "0.5px solid #eee" } },
              React.createElement("div", { style: { width: 26, height: 26, borderRadius: "50%", flexShrink: 0, marginTop: 1, background: msg.role === "user" ? "#E1F5EE" : "#EEEDFE", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 500, color: msg.role === "user" ? "#0F6E56" : "#534AB7" } }, msg.role === "user" ? "U" : "AI"),
              React.createElement("div", { style: { flex: 1, minWidth: 0 } },
                React.createElement("div", { style: { display: "flex", gap: 8, marginBottom: 2 } },
                  React.createElement("span", { style: { fontSize: 11, fontWeight: 500, color: "#888" } }, bot?.company_name || "Unknown"),
                  React.createElement("span", { style: { fontSize: 10, color: "#aaa" } }, new Date(msg.created_at).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }))
                ),
                React.createElement("div", { style: { fontSize: 12, color: "#1a1a1a", lineHeight: 1.5, wordBreak: "break-word" } },
                  (msg.message_text || "").substring(0, 200) + ((msg.message_text || "").length > 200 ? "..." : "")
                )
              )
            );
          })
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
